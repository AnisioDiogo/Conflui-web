<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Brilho sutil no topo -->
  <rect width="512" height="256" rx="115" fill="url(#shine)"/>

  <!-- Letra C geométrica: barra superior -->
  <rect x="158" y="144" width="196" height="68" rx="34" fill="white"/>
  <!-- Letra C geométrica: barra lateral esquerda -->
  <rect x="148" y="144" width="68" height="224" rx="34" fill="white"/>
  <!-- Letra C geométrica: barra inferior -->
  <rect x="158" y="300" width="196" height="68" rx="34" fill="white"/>

  <!-- Ponto de acento (brand mark) -->
  <circle cx="384" cy="256" r="30" fill="white" opacity="0.35"/>
</svg>
